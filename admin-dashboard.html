<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Scholarship Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-require-admin-auth>
  <div class="page admin-page">
    <div class="profile-shell" data-admin-profile-host></div>
    <div class="admin-layout">
      <div class="card sidebar-card">
        <h2>Menu</h2>
        <nav class="nav-list">
          <a class="nav-link active" href="admin-dashboard.html">Dashboard</a>
          <a class="nav-link" href="admin-students.html">List of Students</a>
          <a class="nav-link" href="admin-evaluation.html">Applicant Evaluation</a>
          <a class="nav-link" href="admin-scholars.html">Existing Scholars</a>
        </nav>
      </div>

      <div class="card content-card dashboard-content-card">
        <h1>Scholarship Overview</h1>
        <div class="stats-grid">
          <div class="box stat-card"><h2>Registered Students</h2><p class="big-number">154</p></div>
          <div class="box stat-card"><h2>Accepted</h2><p class="big-number">62</p></div>
          <div class="box stat-card"><h2>Pending</h2><p class="big-number">28</p></div>
          <div class="box stat-card"><h2>Rejected</h2><p class="big-number">19</p></div>
        </div>

        <div class="box">
          <h2>Charts</h2>
          <div class="chart-grid">
            <div class="chart-card">
              <p>Applicants per status</p>
              <div class="bar-row"><span>Approved</span><div class="bar"><div class="fill fill-a"></div></div></div>
              <div class="bar-row"><span>Pending</span><div class="bar"><div class="fill fill-b"></div></div></div>
              <div class="bar-row"><span>Rejected</span><div class="bar"><div class="fill fill-c"></div></div></div>
            </div>
            <div class="chart-card">
              <p>Existing scholars by college</p>
              <div class="bar-row"><span>Engineering</span><div class="bar"><div class="fill fill-d"></div></div></div>
              <div class="bar-row"><span>Education</span><div class="bar"><div class="fill fill-e"></div></div></div>
              <div class="bar-row"><span>Science</span><div class="bar"><div class="fill fill-f"></div></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
