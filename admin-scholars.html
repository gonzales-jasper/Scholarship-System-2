<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Existing Scholars | Scholarship Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-require-admin-auth>
  <div class="page admin-page">
    <div class="profile-shell" data-admin-profile-host></div>
    <div class="admin-layout">
      <div class="card sidebar-card">
        <h2>Menu</h2>
        <nav class="nav-list">
          <a class="nav-link" href="admin-dashboard.html">Dashboard</a>
          <a class="nav-link" href="admin-students.html">List of Students</a>
          <a class="nav-link" href="admin-evaluation.html">Applicant Evaluation</a>
          <a class="nav-link active" href="admin-scholars.html">Existing Scholars</a>
        </nav>
      </div>

      <div class="card content-card">
        <h1>Existing Scholars</h1>
        <div class="admin-toolbar scholars-toolbar">
          <div class="scholars-toolbar-spacer" aria-hidden="true"></div>

          <div class="filter-dropdown">
            <button
              type="button"
              class="button-outline filter-button"
              id="scholars-filter-button"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Filter
            </button>

            <div class="filter-menu" id="scholars-filter-menu" hidden>
              <p class="filter-menu-title">Filter by</p>
              <div class="filter-type-list" role="group" aria-label="Choose scholars filter type">
                <button type="button" class="filter-type-button" data-scholars-filter-type="program">Program</button>
                <button type="button" class="filter-type-button" data-scholars-filter-type="status">Status</button>
              </div>

              <label class="sr-only" for="scholars-filter-value">Choose filter value</label>
              <select id="scholars-filter-value" hidden>
                <option value="all">All</option>
              </select>
            </div>
          </div>
        </div>

        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>Student No.</th>
                <th>Name</th>
                <th>Program</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="scholars-table-body">
              <tr data-program="BSIT" data-status="Active"><td>2023-017</td><td>Elaine Ramos</td><td>BSIT</td><td><span class="status scholar-active">Active</span></td></tr>
              <tr data-program="BSCE" data-status="Active"><td>2023-032</td><td>Mark Salazar</td><td>BSCE</td><td><span class="status scholar-active">Active</span></td></tr>
              <tr data-program="BSED" data-status="Inactive"><td>2023-044</td><td>Jessa Flores</td><td>BSED</td><td><span class="status scholar-inactive">Inactive</span></td></tr>
            </tbody>
          </table>
          <p class="table-empty-state" id="scholars-empty-state" hidden>No scholars match the selected filter.</p>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
