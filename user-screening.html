<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initial Screening | Scholarship Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="form-page student-side-page" data-require-auth>
  <div class="student-side-shell">
    <header class="alt-home-header">
      <div class="alt-home-header-actions">
        <nav class="alt-home-nav" aria-label="Student home sections">
          <a href="student-home.html">Home</a>
          <a href="student-profile.html" data-student-profile-link>Profile</a>
          <a href="student-status.html">Status</a>
          <a class="alt-home-nav-icon-link" href="student-profile.html" data-student-profile-link aria-label="Profile">
            <img src="user_icon.png" alt="" class="alt-home-nav-icon">
          </a>
        </nav>
      </div>
    </header>

    <div class="page page-center student-side-content">
      <div class="card medium-card form-panel screening-card">
      <h1>Student Screening</h1>

      <form id="screening-form">
        <label for="gwa">GWA</label>
        <input id="gwa" name="gwa" type="number" step="0.01" placeholder="Enter GWA" required>

        <label for="enrolled">Enrolled?</label>
        <select id="enrolled" required>
          <option value="">Select</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <div class="actions">
          <a class="button-link back-pill-button" href="student-home.html">Back</a>
          <button type="submit">Submit</button>
        </div>
      </form>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
