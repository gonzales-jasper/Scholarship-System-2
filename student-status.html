<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Status | Scholarship Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="status-page application-empty-page student-side-page" data-require-auth>
  <div class="student-side-shell">
    <header class="alt-home-header">
      <div class="alt-home-header-actions">
        <nav class="alt-home-nav" aria-label="Student home sections">
          <a href="student-home.html">Home</a>
          <a href="student-profile.html" data-student-profile-link>Profile</a>
          <a class="is-active" href="student-status.html">Status</a>
          <a class="alt-home-nav-icon-link" href="student-profile.html" data-student-profile-link aria-label="Profile">
            <img src="user_icon.png" alt="" class="alt-home-nav-icon">
          </a>
        </nav>
      </div>
    </header>

    <div class="page page-center student-side-content">
      <main class="card small-card form-panel empty-application-dialog" role="dialog" aria-modal="true" aria-labelledby="student-status-title">
        <h1 id="student-status-title" data-status-title>Application Status</h1>
        <p class="text" data-status-detail>Your application progress will appear here.</p>
        <p class="text" data-status-next-step></p>
        <div class="actions">
          <a class="button-link back-pill-button" href="student-home.html">Back</a>
          <a class="button-link" data-status-action href="user-screening.html">Apply now</a>
        </div>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
